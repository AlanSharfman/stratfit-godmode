<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STRATFIT — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #040810;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      color: rgba(200, 220, 240, 0.85);
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 32px;
    }
    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(34, 211, 238, 0.7);
      margin-bottom: 32px;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(34, 211, 238, 0.06);
      border: 1px solid rgba(34, 211, 238, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    p {
      font-size: 13px;
      color: rgba(200, 220, 240, 0.4);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    button {
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.12), rgba(34, 211, 238, 0.06));
      color: #22d3ee;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.18), rgba(34, 211, 238, 0.1));
    }
    .hint {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(200, 220, 240, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">STRATFIT</div>
    <div class="icon">⚡</div>
    <h1>You're offline</h1>
    <p>STRATFIT needs an internet connection to load your terrain data. Your saved scenarios and profiles are preserved locally.</p>
    <button onclick="window.location.reload()">Try again</button>
    <div class="hint">Your data is safe in local storage</div>
  </div>
</body>
</html>
