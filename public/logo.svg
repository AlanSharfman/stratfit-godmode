<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
  <defs>
    <!-- Dark metallic block gradient (top face) -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="40%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <!-- Dark metallic block gradient (left face) -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#171923"/>
    </linearGradient>
    <!-- Dark metallic block gradient (right face) -->
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="50%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <!-- Cyan glow layer gradient (top face) — boosted 50% -->
    <linearGradient id="glowTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Cyan glow layer (left face) — boosted -->
    <linearGradient id="glowLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Cyan glow layer (right face) — boosted -->
    <linearGradient id="glowRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="cyan-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#67e8f9" flood-opacity="0.75"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle ambient shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <!-- Top block highlight -->
    <linearGradient id="topHighlight" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#718096" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#4a5568" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a202c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <!-- ═══ BOTTOM BLOCK ═══ -->
    <!-- Bottom block - top face -->
    <polygon points="100,118 155,90 100,62 45,90" fill="url(#topFace)" opacity="0.7"/>
    <!-- Bottom block - left face -->
    <polygon points="45,90 100,118 100,148 45,120" fill="url(#leftFace)"/>
    <!-- Bottom block - right face -->
    <polygon points="155,90 100,118 100,148 155,120" fill="url(#rightFace)"/>

    <!-- ═══ CYAN GLOW LAYER ═══ -->
    <g filter="url(#cyan-glow)">
      <!-- Glow layer - top face -->
      <polygon points="100,105 155,77 100,49 45,77" fill="url(#glowTop)" opacity="1"/>
      <!-- Glow layer - left face -->
      <polygon points="45,77 100,105 100,118 45,90" fill="url(#glowLeft)" opacity="0.95"/>
      <!-- Glow layer - right face -->
      <polygon points="155,77 100,105 100,118 155,90" fill="url(#glowRight)" opacity="0.95"/>
    </g>

    <!-- ═══ TOP BLOCK ═══ -->
    <!-- Top block - top face -->
    <polygon points="100,72 155,44 100,16 45,44" fill="url(#topFace)"/>
    <!-- Top block - top face highlight overlay -->
    <polygon points="100,72 155,44 100,16 45,44" fill="url(#topHighlight)"/>
    <!-- Top block - left face -->
    <polygon points="45,44 100,72 100,105 45,77" fill="url(#leftFace)"/>
    <!-- Top block - right face -->
    <polygon points="155,44 100,72 100,105 155,77" fill="url(#rightFace)"/>
    <!-- Top block - edge highlight (top-left edge) -->
    <line x1="45" y1="44" x2="100" y2="16" stroke="#718096" stroke-width="0.5" opacity="0.5"/>
    <line x1="100" y1="16" x2="155" y2="44" stroke="#718096" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
